# .github/workflows/kimi-review.yml
name: Kimi Code Review

on:
  pull_request:
    branches:
      - 'uat*'
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  kimi-review:
    runs-on: ubuntu-latest

    # 避免 fork PR 拿不到 secret，还可能跑不可信代码
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository

    env:
      KIMI_API_KEY: ${{ secrets.KIMI_API_KEY }}
      KIMI_BASE_URL: https://api.kimi.com/coding/v1
      GH_TOKEN: ${{ secrets.GH_TOKEN }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Kimi Code CLI
        run: |
          curl -LsSf https://code.kimi.com/install.sh | bash
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Check tools
        run: |
          kimi --version
          gh --version
          gh auth status

      - name: Generate PR diff
        if: github.event_name == 'pull_request'
        run: |
          git fetch origin "${{ github.base_ref }}"
          git diff "origin/${{ github.base_ref }}...HEAD" > pr.diff
          test -s pr.diff
      - name: Smoke test Kimi
        run: |
          echo "Say OK only." | kimi --print \
            --input-format text \
            --output-format text \
            --final-message-only

      - name: Run Kimi review
        if: github.event_name == 'pull_request'
        run: |
          cat > review-prompt.md <<'EOF'
          Review this pull request diff.
          Requirements:
          - Focus on real bugs, security issues, regressions, and missing tests.
          - Do not nitpick formatting unless it causes behavior or maintainability problems.
          - Output concise Markdown with file paths and line references when possible.

          Diff:
          EOF

          head -c 200000 pr.diff >> review-prompt.md

          wc -c review-prompt.md

          kimi --print \
            --input-format text \
            --output-format text \
            --no-thinking \
            --final-message-only \
            --work-dir "$GITHUB_WORKSPACE" \
            < review-prompt.md \
            > kimi-review.md \
            2> kimi-stderr.log
          status=$?
          set -e

          if [ "$status" -ne 0 ]; then
            echo "kimi exited with status $status"
            echo "=== kimi stderr ==="
            cat kimi-stderr.log || true
            echo "=== kimi logs ==="
            find "${KIMI_SHARE_DIR:-$HOME/.kimi}" -type f -maxdepth 4 2>/dev/null | sort || true
            find "${KIMI_SHARE_DIR:-$HOME/.kimi}" -type f -name "*.log" -maxdepth 4 -print -exec tail -n 120 {} \; 2>/dev/null || true
            exit "$status"
          fi

          test -s kimi-review.md

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        run: |
          gh pr comment "${{ github.event.pull_request.number }}" \
            --body-file kimi-review.md


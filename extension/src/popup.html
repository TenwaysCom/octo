<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tenways Octo</title>
    <style>
      :root {
        --primary: #4F46E5;
        --primary-hover: #4338CA;
        --success: #059669;
        --warning: #D97706;
        --error: #DC2626;
        --bg: #F9FAFB;
        --card: #FFFFFF;
        --border: #E5E7EB;
        --text: #1F2937;
        --text-muted: #6B7280;
      }

      * { margin: 0; padding: 0; box-sizing: border-box; }

      body {
        width: 340px;
        min-height: 200px;
        background: var(--bg);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        font-size: 14px;
        color: var(--text);
      }

      .header {
        background: linear-gradient(135deg, var(--primary), #7C3AED);
        color: white;
        padding: 16px;
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .header-icon {
        width: 32px;
        height: 32px;
        background: rgba(255,255,255,0.2);
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
      }

      .header-title {
        font-size: 16px;
        font-weight: 600;
      }

      .header-subtitle {
        font-size: 12px;
        opacity: 0.8;
      }

      .content {
        padding: 16px;
      }

      .page-info {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 12px;
        margin-bottom: 12px;
      }

      .page-type {
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .page-type .icon { font-size: 16px; }

      .page-url {
        font-size: 11px;
        color: var(--text-muted);
        margin-top: 4px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .auth-section {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 8px;
        margin-bottom: 12px;
        overflow: hidden;
      }

      .auth-header {
        padding: 10px 12px;
        font-weight: 600;
        font-size: 13px;
        border-bottom: 1px solid var(--border);
        background: #F3F4F6;
      }

      .auth-item {
        padding: 10px 12px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-bottom: 1px solid var(--border);
      }

      .auth-item:last-child { border-bottom: none; }

      .auth-label {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 13px;
      }

      .auth-status {
        font-size: 12px;
        padding: 2px 8px;
        border-radius: 4px;
      }

      .auth-status.ready {
        background: #D1FAE5;
        color: var(--success);
      }

      .auth-status.pending {
        background: #FEF3C7;
        color: var(--warning);
      }

      .auth-status.error {
        background: #FEE2E2;
        color: var(--error);
      }

      .actions {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      button {
        padding: 10px 16px;
        border: none;
        border-radius: 6px;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }

      button.primary {
        background: var(--primary);
        color: white;
      }

      button.primary:hover { background: var(--primary-hover); }

      button.secondary {
        background: var(--card);
        color: var(--text);
        border: 1px solid var(--border);
      }

      button.secondary:hover { background: #F3F4F6; }

      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .log-section {
        margin-top: 12px;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 8px;
        overflow: hidden;
      }

      .log-header {
        padding: 8px 12px;
        font-size: 12px;
        font-weight: 600;
        background: #F3F4F6;
        border-bottom: 1px solid var(--border);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .log-clear {
        background: none;
        border: none;
        color: var(--text-muted);
        font-size: 11px;
        cursor: pointer;
        padding: 0;
      }

      .log-clear:hover { color: var(--text); }

      .log-content {
        padding: 8px 12px;
        font-family: monospace;
        font-size: 11px;
        max-height: 120px;
        overflow-y: auto;
        background: #1F2937;
        color: #E5E7EB;
      }

      .log-entry { margin-bottom: 4px; }

      .log-entry.error { color: #FCA5A5; }

      .log-entry.success { color: #86EFAC; }

      .log-entry.warn { color: #FCD34D; }

      .hidden { display: none !important; }
    </style>
  </head>
  <body>
    <div class="header">
      <div class="header-icon">⬡</div>
      <div>
        <div class="header-title">Tenways Octo</div>
        <div class="header-subtitle" id="headerSubtitle">检测页面中...</div>
      </div>
    </div>

    <div class="content">
      <!-- 用户身份信息 -->
      <div class="auth-section" id="userIdentitySection">
        <div class="auth-header">👤 用户身份</div>
        <div class="auth-item">
          <div class="auth-label"><span>Lark ID</span></div>
          <span class="auth-status pending" id="larkUserId">获取中...</span>
        </div>
        <div class="auth-item">
          <div class="auth-label"><span>Meegle Key</span></div>
          <span class="auth-status pending" id="meegleUserKey">获取中...</span>
        </div>
        <div style="padding: 8px 12px;">
          <button class="secondary" id="refreshIdentityBtn" style="width: 100%;">🔄 刷新身份</button>
        </div>
      </div>

      <!-- 页面信息 -->
      <div class="page-info">
        <div class="page-type">
          <span class="icon" id="pageIcon">❓</span>
          <span id="pageTypeText">未知页面</span>
        </div>
        <div class="page-url" id="pageUrl">-</div>
      </div>

      <!-- 认证状态 (Meegle 页面) -->
      <div class="auth-section" id="meegleAuthSection">
        <div class="auth-header">🔐 Meegle 认证</div>
        <div class="auth-item">
          <div class="auth-label">
            <span>认证状态</span>
          </div>
          <span class="auth-status pending" id="meegleAuthStatus">检查中...</span>
        </div>
        <div class="actions" style="padding: 12px;">
          <button class="primary" id="meegleAuthBtn">获取认证</button>
          <button class="secondary" id="meegleRefreshBtn">刷新状态</button>
        </div>
      </div>

      <!-- 认证状态 (Lark 页面) -->
      <div class="auth-section" id="larkAuthSection">
        <div class="auth-header">🔐 认证状态</div>
        <div class="auth-item">
          <div class="auth-label"><span>Meegle</span></div>
          <span class="auth-status pending" id="larkMeegleAuthStatus">检查中...</span>
        </div>
        <div class="auth-item">
          <div class="auth-label"><span>Lark</span></div>
          <span class="auth-status pending" id="larkLarkAuthStatus">检查中...</span>
        </div>
      </div>

      <!-- Lark A1 操作按钮 -->
      <div class="actions" id="larkA1Actions">
        <button class="primary" id="analyzeBtn" disabled>📊 分析工单</button>
        <button class="secondary" id="draftBtn" disabled>📝 生成 Bug 草稿</button>
        <button class="secondary" id="applyBtn" disabled>✅ 确认创建 Bug</button>
      </div>

      <!-- Lark A2 操作按钮 -->
      <div class="actions" id="larkA2Actions">
        <button class="primary" id="analyzeA2Btn" disabled>📊 分析需求</button>
        <button class="secondary" id="draftA2Btn" disabled>📝 生成需求草稿</button>
        <button class="secondary" id="applyA2Btn" disabled>✅ 确认创建需求</button>
      </div>

      <!-- Lark 其他页面 -->
      <div class="actions" id="larkOtherActions">
        <button class="primary" id="pmAnalysisBtn">📈 PM 分析</button>
      </div>

      <!-- PM 分析面板 -->
      <div class="auth-section hidden" id="pmAnalysisSection">
        <div class="auth-header">📈 PM 分析</div>
        <div class="auth-item">
          <div class="auth-label"><span>时间范围</span></div>
          <select id="pmTimeRange" style="padding: 4px; border-radius: 4px; border: 1px solid var(--border);">
            <option value="7d">最近 7 天</option>
            <option value="14d">最近 14 天</option>
            <option value="30d" selected>最近 30 天</option>
          </select>
        </div>
        <div class="actions" style="padding: 12px;">
          <button class="primary" id="runPmAnalysisBtn">开始分析</button>
          <button class="secondary" id="closePmAnalysisBtn">关闭</button>
        </div>
        <div id="pmResult" style="padding: 12px; font-size: 12px; display: none;"></div>
      </div>

      <!-- 不支持页面提示 -->
      <div id="unsupportedPage" class="hidden">
        <div style="text-align: center; padding: 20px; color: var(--text-muted);">
          <div style="font-size: 32px; margin-bottom: 8px;">🚫</div>
          <div>当前页面不支持</div>
          <div style="font-size: 12px; margin-top: 4px;">请切换到 Lark 或 Meegle 页面</div>
        </div>
      </div>

      <!-- 日志 -->
      <div class="log-section">
        <div class="log-header">
          <span>日志</span>
          <button class="log-clear" id="clearLogBtn">清除</button>
        </div>
        <div class="log-content" id="logContent"></div>
      </div>
    </div>

    <script type="module" src="popup.js"></script>
  </body>
</html>

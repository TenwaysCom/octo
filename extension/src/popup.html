<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Octo Tenways IT Assistant</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        width: 320px;
        padding: 16px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        font-size: 14px;
        color: #333;
      }
      h1 {
        font-size: 16px;
        margin-bottom: 12px;
        color: #1a1a1a;
      }
      .status {
        padding: 8px 12px;
        border-radius: 6px;
        margin-bottom: 12px;
        font-size: 13px;
      }
      .status.ready {
        background: #e8f5e9;
        color: #2e7d32;
      }
      .status.pending {
        background: #fff3e0;
        color: #ef6c00;
      }
      .status.error {
        background: #ffebee;
        color: #c62828;
      }
      .actions {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      button {
        padding: 10px 16px;
        border: none;
        border-radius: 6px;
        font-size: 13px;
        cursor: pointer;
        transition: background-color 0.2s;
      }
      button.primary {
        background: #1a73e8;
        color: white;
      }
      button.primary:hover {
        background: #1557b0;
      }
      button.secondary {
        background: #f1f3f4;
        color: #333;
      }
      button.secondary:hover {
        background: #e8eaed;
      }
      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .info {
        margin-top: 16px;
        padding-top: 12px;
        border-top: 1px solid #eee;
        font-size: 12px;
        color: #666;
      }
      .log {
        margin-top: 12px;
        padding: 8px;
        background: #f8f9fa;
        border-radius: 4px;
        font-family: monospace;
        font-size: 11px;
        max-height: 150px;
        overflow-y: auto;
      }
      .log-entry {
        margin-bottom: 4px;
      }
      .log-entry.error {
        color: #c62828;
      }
      .log-entry.success {
        color: #2e7d32;
      }
    </style>
  </head>
  <body>
    <h1>IT PM Assistant</h1>

    <div id="status" class="status pending">检测中...</div>

    <div class="actions">
      <button id="analyzeBtn" class="primary" disabled>分析当前页面</button>
      <button id="draftBtn" class="secondary" disabled>生成草稿</button>
      <button id="applyBtn" class="secondary" disabled>确认创建</button>
    </div>

    <div id="log" class="log"></div>

    <div class="info">
      <p><strong>快捷键:</strong></p>
      <p>Alt+A - 分析当前页面</p>
      <p>Alt+D - 生成草稿</p>
    </div>

    <script type="module">
      const SERVER_URL = 'http://localhost:3000';

      const els = {
        status: document.getElementById('status'),
        analyzeBtn: document.getElementById('analyzeBtn'),
        draftBtn: document.getElementById('draftBtn'),
        applyBtn: document.getElementById('applyBtn'),
        log: document.getElementById('log'),
      };

      let currentState = {
        pageType: null,
        recordId: null,
        analysisResult: null,
        draftResult: null,
      };

      function log(message, type = 'info') {
        const entry = document.createElement('div');
        entry.className = `log-entry ${type}`;
        entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
        els.log.appendChild(entry);
        els.log.scrollTop = els.log.scrollHeight;
      }

      function setStatus(status, text) {
        els.status.className = `status ${status}`;
        els.status.textContent = text;
      }

      function setButtonsEnabled(enabled) {
        els.analyzeBtn.disabled = !enabled;
        els.draftBtn.disabled = !enabled;
        els.applyBtn.disabled = !enabled;
      }

      async function detectPage() {
        try {
          const [tab] = await chrome.tabs.query({ active: true, currentWindow: true });
          const url = tab.url;

          if (url.includes('feishu.cn') || url.includes('larksuite.com')) {
            if (url.includes('/a1/') || url.includes('support')) {
              currentState.pageType = 'lark_a1';
              setStatus('ready', 'Lark 支持工单页面');
              setButtonsEnabled(true);
              log('检测到 Lark A1 页面', 'success');
            } else if (url.includes('/a2/') || url.includes('requirement')) {
              currentState.pageType = 'lark_a2';
              setStatus('ready', 'Lark 需求页面');
              setButtonsEnabled(true);
              log('检测到 Lark A2 页面', 'success');
            } else {
              setStatus('pending', 'Lark 页面 (非工单/需求)');
              log('Lark 页面，但不是 A1/A2 类型');
            }
          } else if (url.includes('meegle.com')) {
            currentState.pageType = 'meegle';
            setStatus('ready', 'Meegle 页面');
            log('检测到 Meegle 页面', 'success');
          } else {
            setStatus('error', '不支持的页面');
            log('当前页面不支持', 'error');
          }
        } catch (err) {
          setStatus('error', '检测失败');
          log(`检测失败：${err.message}`, 'error');
        }
      }

      async function analyzePage() {
        if (!currentState.pageType?.startsWith('lark_')) {
          log('请先切换到 Lark 页面', 'error');
          return;
        }

        log('开始分析...');
        els.analyzeBtn.disabled = true;

        try {
          const [tab] = await chrome.tabs.query({ active: true, currentWindow: true });

          // 从页面提取 recordId (简化版本，实际需要 content script 配合)
          const recordId = `rec_${Date.now()}`;
          currentState.recordId = recordId;

          const response = await fetch(`${SERVER_URL}/api/a1/analyze`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              requestId: `req_${Date.now()}`,
              operatorLarkId: 'ou_current_user',
              recordId,
              pageContext: {
                pageType: currentState.pageType,
                baseId: 'app_sample',
                tableId: 'tbl_sample',
              },
            }),
          });

          const result = await response.json();

          if (result.ok) {
            currentState.analysisResult = result.data;
            els.draftBtn.disabled = false;
            log(`分析完成：${result.data.summary}`, 'success');
          } else {
            log(`分析失败：${result.error?.errorMessage}`, 'error');
          }
        } catch (err) {
          log(`分析失败：${err.message}`, 'error');
        } finally {
          els.analyzeBtn.disabled = false;
        }
      }

      async function generateDraft() {
        if (!currentState.analysisResult) {
          log('请先分析页面', 'error');
          return;
        }

        log('生成草稿中...');
        els.draftBtn.disabled = true;

        try {
          const response = await fetch(`${SERVER_URL}/api/a1/create-b2-draft`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              requestId: `req_${Date.now()}`,
              operatorLarkId: 'ou_current_user',
              recordId: currentState.recordId,
            }),
          });

          const result = await response.json();

          if (result.ok) {
            currentState.draftResult = result.data;
            els.applyBtn.disabled = false;
            log(`草稿生成：${result.data.draft?.name || '未完成'}`, 'success');
          } else {
            log(`草稿生成失败：${result.error?.errorMessage}`, 'error');
          }
        } catch (err) {
          log(`草稿生成失败：${err.message}`, 'error');
        } finally {
          els.draftBtn.disabled = false;
        }
      }

      async function applyDraft() {
        if (!currentState.draftResult) {
          log('请先生成草稿', 'error');
          return;
        }

        if (!confirm('确认创建此工作项吗？')) {
          return;
        }

        log('创建中...');
        els.applyBtn.disabled = true;

        try {
          const response = await fetch(`${SERVER_URL}/api/a1/apply-b2`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              requestId: `req_${Date.now()}`,
              draftId: currentState.draftResult.draftId,
              operatorLarkId: 'ou_current_user',
              sourceRecordId: currentState.recordId,
              idempotencyKey: `idem_${Date.now()}`,
              confirmedDraft: currentState.draftResult.draft,
            }),
          });

          const result = await response.json();

          if (result.ok) {
            log(`创建成功！工作项 ID: ${result.data.workitemId}`, 'success');
            setStatus('ready', '创建成功');
          } else {
            log(`创建失败：${result.error?.errorMessage}`, 'error');
          }
        } catch (err) {
          log(`创建失败：${err.message}`, 'error');
        } finally {
          els.applyBtn.disabled = false;
        }
      }

      // Event listeners
      els.analyzeBtn.addEventListener('click', analyzePage);
      els.draftBtn.addEventListener('click', generateDraft);
      els.applyBtn.addEventListener('click', applyDraft);

      // Initialize
      detectPage();

      // Keyboard shortcuts
      document.addEventListener('keydown', (e) => {
        if (e.altKey && e.key === 'a') {
          e.preventDefault();
          analyzePage();
        } else if (e.altKey && e.key === 'd') {
          e.preventDefault();
          generateDraft();
        }
      });
    </script>
  </body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tenways Octo</title>
    <style>
      :root {
        --primary: #4F46E5;
        --primary-hover: #4338CA;
        --success: #059669;
        --warning: #D97706;
        --error: #DC2626;
        --bg: #F9FAFB;
        --card: #FFFFFF;
        --border: #E5E7EB;
        --text: #1F2937;
        --text-muted: #6B7280;
      }

      * { margin: 0; padding: 0; box-sizing: border-box; }

      body {
        width: 340px;
        min-height: 200px;
        background: var(--bg);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        font-size: 14px;
        color: var(--text);
      }

      .header {
        background: linear-gradient(135deg, var(--primary), #7C3AED);
        color: white;
        padding: 12px 16px;
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .header-icon {
        width: 28px;
        height: 28px;
        background: rgba(255,255,255,0.2);
        border-radius: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 16px;
      }

      .header-title { font-size: 15px; font-weight: 600; }
      .header-subtitle { font-size: 11px; opacity: 0.8; }

      .content { padding: 12px; }

      /* Authorization Block */
      .auth-block {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 8px;
        overflow: hidden;
        margin-bottom: 12px;
      }

      .auth-block-header {
        padding: 8px 12px;
        font-weight: 600;
        font-size: 12px;
        background: #F3F4F6;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .auth-row {
        padding: 10px 12px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-bottom: 1px solid var(--border);
      }

      .auth-row:last-child { border-bottom: none; }

      .auth-row-label {
        font-size: 13px;
        color: var(--text);
      }

      .auth-row-value {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .auth-status {
        font-size: 11px;
        padding: 2px 6px;
        border-radius: 4px;
        max-width: 120px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .auth-status.ready { background: #D1FAE5; color: var(--success); }
      .auth-status.pending { background: #FEF3C7; color: var(--warning); }
      .auth-status.error { background: #FEE2E2; color: var(--error); }

      .auth-btn {
        padding: 6px 12px;
        border: none;
        border-radius: 4px;
        font-size: 11px;
        font-weight: 500;
        cursor: pointer;
        background: var(--primary);
        color: white;
        white-space: nowrap;
      }

      .auth-btn:hover { background: var(--primary-hover); }
      .auth-btn:disabled { opacity: 0.5; cursor: not-allowed; }
      .auth-btn.secondary { background: #E5E7EB; color: var(--text); }
      .auth-btn.secondary:hover { background: #D1D5DB; }

      /* Feature Block */
      .feature-block {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 8px;
        overflow: hidden;
        margin-bottom: 12px;
      }

      .feature-block-header {
        padding: 8px 12px;
        font-weight: 600;
        font-size: 12px;
        background: #F3F4F6;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .feature-actions {
        padding: 12px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .feature-btn {
        padding: 10px 14px;
        border: none;
        border-radius: 6px;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        transition: background 0.2s;
      }

      .feature-btn.primary { background: var(--primary); color: white; }
      .feature-btn.primary:hover { background: var(--primary-hover); }
      .feature-btn.secondary { background: #F3F4F6; color: var(--text); border: 1px solid var(--border); }
      .feature-btn.secondary:hover { background: #E5E7EB; }
      .feature-btn:disabled { opacity: 0.5; cursor: not-allowed; }

      /* Unsupported Page */
      .unsupported {
        text-align: center;
        padding: 40px 20px;
        color: var(--text-muted);
      }

      .unsupported-icon { font-size: 40px; margin-bottom: 12px; }
      .unsupported-text { font-size: 14px; margin-bottom: 8px; }
      .unsupported-hint { font-size: 12px; }

      /* Log */
      .log-section {
        margin-top: 12px;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 8px;
        overflow: hidden;
      }

      .log-header {
        padding: 6px 12px;
        font-size: 11px;
        background: #F3F4F6;
        border-bottom: 1px solid var(--border);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .log-clear {
        background: none;
        border: none;
        color: var(--text-muted);
        font-size: 10px;
        cursor: pointer;
      }

      .log-content {
        padding: 8px;
        font-family: monospace;
        font-size: 10px;
        max-height: 80px;
        overflow-y: auto;
        background: #1F2937;
        color: #E5E7EB;
      }

      .log-entry { margin-bottom: 2px; }
      .log-entry.error { color: #FCA5A5; }
      .log-entry.success { color: #86EFAC; }
      .log-entry.warn { color: #FCD34D; }

      .hidden { display: none !important; }

      /* Settings Button */
      .settings-btn {
        background: none;
        border: none;
        color: white;
        opacity: 0.7;
        cursor: pointer;
        font-size: 16px;
        padding: 4px;
        margin-left: auto;
      }
      .settings-btn:hover { opacity: 1; }

      /* Settings Modal */
      .modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0,0,0,0.5);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 100;
      }
      .modal {
        background: var(--card);
        border-radius: 8px;
        width: 300px;
        max-width: 90%;
      }
      .modal-header {
        padding: 12px 16px;
        font-weight: 600;
        border-bottom: 1px solid var(--border);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .modal-close {
        background: none;
        border: none;
        font-size: 18px;
        cursor: pointer;
        color: var(--text-muted);
      }
      .modal-close:hover { color: var(--text); }
      .modal-body {
        padding: 16px;
      }
      .form-group {
        margin-bottom: 12px;
      }
      .form-label {
        display: block;
        font-size: 12px;
        color: var(--text-muted);
        margin-bottom: 4px;
      }
      .form-input {
        width: 100%;
        padding: 8px 10px;
        border: 1px solid var(--border);
        border-radius: 4px;
        font-size: 13px;
      }
      .form-input:focus {
        outline: none;
        border-color: var(--primary);
      }
      .modal-actions {
        display: flex;
        gap: 8px;
        margin-top: 16px;
      }
      .modal-actions .auth-btn {
        flex: 1;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <div class="header-icon">⬡</div>
      <div>
        <div class="header-title">Tenways Octo</div>
        <div class="header-subtitle" id="headerSubtitle">检测页面中...</div>
      </div>
      <button class="settings-btn" id="settingsBtn" title="设置">⚙️</button>
    </div>

    <div class="content">
      <!-- 不支持页面 -->
      <div id="unsupportedPage" class="unsupported hidden">
        <div class="unsupported-icon">🚫</div>
        <div class="unsupported-text">当前页面不支持</div>
        <div class="unsupported-hint">请在 Lark 或 Meegle 页面使用</div>
      </div>

      <!-- 授权板块 (顶部) -->
      <div id="authBlockTop" class="auth-block hidden">
        <div class="auth-block-header">🔐 授权状态</div>
        <div class="auth-row">
          <span class="auth-row-label">Meegle User</span>
          <div class="auth-row-value">
            <span class="auth-status pending" id="meegleUserTop">-</span>
            <button class="auth-btn" id="meegleAuthBtn">授权</button>
          </div>
        </div>
        <div class="auth-row">
          <span class="auth-row-label">Lark User</span>
          <div class="auth-row-value">
            <span class="auth-status pending" id="larkUserTop">-</span>
            <button class="auth-btn" id="larkAuthBtn">授权</button>
          </div>
        </div>
      </div>

      <!-- Meegle 功能板块 -->
      <div id="meegleFeatureBlock" class="feature-block hidden">
        <div class="feature-block-header">🔷 Meegle 功能</div>
        <div class="feature-actions">
          <button class="feature-btn primary" id="meegleActionBtn">查看来源上下文</button>
        </div>
      </div>

      <!-- Lark 功能板块 -->
      <div id="larkFeatureBlock" class="feature-block hidden">
        <div class="feature-block-header">📋 Lark 功能</div>
        <div class="feature-actions">
          <button class="feature-btn primary" id="analyzeBtn" disabled>📊 分析当前页面</button>
          <button class="feature-btn secondary" id="draftBtn" disabled>📝 生成草稿</button>
          <button class="feature-btn secondary" id="applyBtn" disabled>✅ 确认创建</button>
        </div>
      </div>

      <!-- 授权板块 (底部 - 授权后显示) -->
      <div id="authBlockBottom" class="auth-block hidden">
        <div class="auth-block-header">🔐 授权状态</div>
        <div class="auth-row">
          <span class="auth-row-label">Meegle User</span>
          <div class="auth-row-value">
            <span class="auth-status pending" id="meegleUserBottom">-</span>
            <button class="auth-btn secondary" id="meegleReauthBtn">重新授权</button>
          </div>
        </div>
        <div class="auth-row">
          <span class="auth-row-label">Lark User</span>
          <div class="auth-row-value">
            <span class="auth-status pending" id="larkUserBottom">-</span>
            <button class="auth-btn secondary" id="larkReauthBtn">重新授权</button>
          </div>
        </div>
      </div>

      <!-- 日志 -->
      <div class="log-section">
        <div class="log-header">
          <span>日志</span>
          <button class="log-clear" id="clearLogBtn">清除</button>
        </div>
        <div class="log-content" id="logContent"></div>
      </div>
    </div>

    <!-- 设置模态框 -->
    <div id="settingsModal" class="modal-overlay hidden">
      <div class="modal">
        <div class="modal-header">
          <span>⚙️ 设置</span>
          <button class="modal-close" id="closeSettingsBtn">&times;</button>
        </div>
        <div class="modal-body">
          <div class="form-group">
            <label class="form-label">Meegle User Key</label>
            <input type="text" class="form-input" id="meegleUserKeyInput" placeholder="输入 Meegle User Key">
          </div>
          <div class="form-group">
            <label class="form-label">Lark User ID (可选)</label>
            <input type="text" class="form-input" id="larkUserIdInput" placeholder="输入 Lark User ID">
          </div>
          <div class="modal-actions">
            <button class="auth-btn secondary" id="cancelSettingsBtn">取消</button>
            <button class="auth-btn" id="saveSettingsBtn">保存</button>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="popup.js"></script>
  </body>
</html>
